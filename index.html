<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title data-i18n="page.home">首页 - Flex Tech</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">Flex Tech</div>
  <ul class="nav-menu">
    <li class="active"><a href="index.html" data-i18n="nav.home"></a></li>
    <li><a href="product.html" data-i18n="nav.product"></a></li>
    <li><a href="about.html" data-i18n="nav.about"></a></li>
    <li><a href="contact.html" data-i18n="nav.contact"></a></li>
  </ul>
  <div class="lang-switch">
    <button class="lang-btn" id="btn-zh">中</button>
    <button class="lang-btn" id="btn-en">En</button>
  </div>
</div>

<div class="container">
  <div class="hero page-fade">
    <div class="hero-text">
      <h1 data-i18n="heroTitle"></h1>
      <p data-i18n="heroText"></p>
      <button class="hero-btn" data-i18n="heroBtn"></button>
    </div>
    <div class="hero-img"></div>
  </div>

  <h2 class="section-title page-fade" data-i18n="service"></h2>
  <p class="sub-title page-fade" data-i18n="serviceSub"></p>
  <div class="card-group page-fade">
    <div class="card">
      <h3 data-i18n="card1Title"></h3>
      <p data-i18n="card1Desc"></p>
    </div>
    <div class="card">
      <h3 data-i18n="card2Title"></h3>
      <p data-i18n="card2Desc"></p>
    </div>
    <div class="card">
      <h3 data-i18n="card3Title"></h3>
      <p data-i18n="card3Desc"></p>
    </div>
    <div class="card">
      <h3 data-i18n="card4Title"></h3>
      <p data-i18n="card4Desc"></p>
    </div>
  </div>

  <h2 class="section-title page-fade" style="margin-top:80px" data-i18n="tech"></h2>
  <div class="two-col page-fade">
    <div class="box">
      <h3 data-i18n="tech1"></h3>
      <br>
      <p data-i18n="tech1Desc"></p>
    </div>
    <div class="box">
      <h3 data-i18n="tech2"></h3>
      <br>
      <p data-i18n="tech2Desc"></p>
    </div>
  </div>

  <h2 class="section-title page-fade" style="margin-top:80px" data-i18n="slider"></h2>
  <div class="slider page-fade">
    <div class="slide-item active" style="background:#3b82f6" data-i18n="slide1"></div>
    <div class="slide-item" style="background:#8b5cf6" data-i18n="slide2"></div>
    <div class="slide-item" style="background:#ef4444" data-i18n="slide3"></div>
  </div>
</div>

<footer data-i18n="footer"></footer>
<button class="back-top">↑</button>
<script src="js/script.js"></script>
</body>
</html>
