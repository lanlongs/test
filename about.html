<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title data-i18n="page.about">关于我们 - Flex Tech</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">Flex Tech</div>
  <ul class="nav-menu">
    <li><a href="index.html" data-i18n="nav.home"></a></li>
    <li><a href="product.html" data-i18n="nav.product"></a></li>
    <li class="active"><a href="about.html" data-i18n="nav.about"></a></li>
    <li><a href="contact.html" data-i18n="nav.contact"></a></li>
  </ul>
  <div class="lang-switch">
    <button class="lang-btn" id="btn-zh">中</button>
    <button class="lang-btn" id="btn-en">En</button>
  </div>
</div>

<div class="container">
  <h2 class="section-title page-fade" data-i18n="aboutTitle"></h2>
  <p class="sub-title page-fade" data-i18n="aboutSub"></p>

  <div class="box page-fade">
    <h3 data-i18n="aboutIntro"></h3>
    <br>
    <p data-i18n="aboutDesc"></p>
  </div>

  <h2 class="section-title page-fade" style="margin-top:80px" data-i18n="history"></h2>
  <div class="timeline page-fade">
    <div class="timeline-item">
      <h4 data-i18n="year1"></h4>
      <p data-i18n="year1Desc"></p>
    </div>
    <div class="timeline-item">
      <h4 data-i18n="year2"></h4>
      <p data-i18n="year2Desc"></p>
    </div>
    <div class="timeline-item">
      <h4 data-i18n="year3"></h4>
      <p data-i18n="year3Desc"></p>
    </div>
  </div>

  <h2 class="section-title page-fade" style="margin-top:80px" data-i18n="data"></h2>
  <div class="counter-group page-fade">
    <div class="counter">
      <div class="num">1000</div>
      <p data-i18n="project"></p>
    </div>
    <div class="counter">
      <div class="num">5000</div>
      <p data-i18n="user"></p>
    </div>
    <div class="counter">
      <div class="num">100</div>
      <p data-i18n="plan"></p>
    </div>
    <div class="counter">
      <div class="num">5</div>
      <p data-i18n="year"></p>
    </div>
  </div>
</div>

<footer data-i18n="footer"></footer>
<button class="back-top">↑</button>
<script src="js/script.js"></script>
</body>
</html>
