<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title data-i18n="page.product">产品中心 - Flex Tech</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">Flex Tech</div>
  <ul class="nav-menu">
    <li><a href="index.html" data-i18n="nav.home"></a></li>
    <li class="active"><a href="product.html" data-i18n="nav.product"></a></li>
    <li><a href="about.html" data-i18n="nav.about"></a></li>
    <li><a href="contact.html" data-i18n="nav.contact"></a></li>
  </ul>
  <div class="lang-switch">
    <button class="lang-btn" id="btn-zh">中</button>
    <button class="lang-btn" id="btn-en">En</button>
  </div>
</div>

<div class="container">
  <h2 class="section-title page-fade" data-i18n="productTitle"></h2>
  <p class="sub-title page-fade" data-i18n="productSub"></p>

  <div class="tab-nav page-fade">
    <button class="tab-btn active" data-i18n="tab1"></button>
    <button class="tab-btn" data-i18n="tab2"></button>
    <button class="tab-btn" data-i18n="tab3"></button>
  </div>
  <div class="tab-panels page-fade">
    <div class="tab-panel active" data-i18n="tab1Desc"></div>
    <div class="tab-panel" data-i18n="tab2Desc"></div>
    <div class="tab-panel" data-i18n="tab3Desc"></div>
  </div>

  <h2 class="section-title page-fade" style="margin-top:80px" data-i18n="package"></h2>
  <div class="card-group page-fade">
    <div class="card">
      <h3 data-i18n="pkg1"></h3>
      <p data-i18n="pkg1Desc"></p>
    </div>
    <div class="card">
      <h3 data-i18n="pkg2"></h3>
      <p data-i18n="pkg2Desc"></p>
    </div>
    <div class="card">
      <h3 data-i18n="pkg3"></h3>
      <p data-i18n="pkg3Desc"></p>
    </div>
  </div>
</div>

<footer data-i18n="footer"></footer>
<button class="back-top">↑</button>
<script src="js/script.js"></script>
</body>
</html>
